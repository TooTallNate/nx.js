name: CI

on:
  push:
    branches:
      - main
    tags:
      - "!*"
  pull_request:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container: ghcr.io/tootallnate/pacman-packages@sha256:667d2b78eaac3f52996fe60b6ac45cf4b546726ac640b279669aa79aeff195ee
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependent packages
        run: pnpm build --filter @nx.js/runtime

      - name: Bundle `runtime.js`
        run: pnpm bundle

      - name: Check bundle for esbuild class renames
        run: node packages/runtime/check-def-names.mjs

      - name: Build `nxjs.nro`
        run: make V=1

      - uses: actions/upload-artifact@v4
        with:
          name: nxjs.nro
          path: nxjs.nro

      - uses: actions/upload-artifact@v4
        with:
          name: nxjs.nsp
          path: |
            build/exefs/
            romfs/
            icon.jpg
            nxjs.nacp

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download `nxjs.nro`
        uses: actions/download-artifact@v4
        with:
          name: nxjs.nro

      - name: Download `nxjs.nsp`
        uses: actions/download-artifact@v4
        with:
          name: nxjs.nsp

      - name: Fetch git tags
        run: git fetch origin 'refs/tags/*:refs/tags/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Copy `nxjs.nro` to "@nx.js/nro"
        run: cp -v nxjs.nro packages/nro/dist

      - name: Copy files to "@nx.js/nsp"
        run: cp -rv build/exefs romfs nxjs.nacp icon.jpg packages/nsp

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if published happened)
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { createRelease } = await import('${{ github.workspace }}/.github/scripts/create-release.mjs')
            await createRelease({ github, context })

  test:
    name: Test
    runs-on: ubuntu-latest
    # Run in the pacman-packages image: it provides the host-native V8, Skia,
    # and libuv (under /opt/host) that the nxjs-test conformance harness links
    # against (the Switch portlibs are target_os=horizon and can't link into a
    # host ELF). The harness + Skia + V8 are all built against the system
    # libstdc++, so compile the harness with clang-16/lld against /opt/host.
    container: ghcr.io/tootallnate/pacman-packages@sha256:ab26d09e381328e61d6e786d147d4a719905cb566bdd8bb77cec5d65c4230ea7
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install build + host toolchain deps
        run: |
          apt-get update
          apt-get install -y \
            cmake pkg-config lsb-release wget software-properties-common gnupg \
            libmbedtls-dev libfreetype-dev libharfbuzz-dev \
            libpng-dev libturbojpeg0-dev libjpeg62-turbo-dev libwebp-dev \
            zlib1g-dev libzstd-dev
          # The host V8/Skia archives are produced by a modern Clang that emits
          # CREL relocations. Linking them requires LLVM >= 18 (lld-16 cannot
          # process CREL and silently leaves .init_array unrelocated, which
          # crashes at startup). Prefer clang-19 if the image already ships it,
          # otherwise install it from apt.llvm.org.
          if ! command -v clang-19 >/dev/null 2>&1; then
            wget -q https://apt.llvm.org/llvm.sh -O /tmp/llvm.sh
            chmod +x /tmp/llvm.sh
            /tmp/llvm.sh 19
          fi
          ln -sf /usr/bin/ld.lld-19 /usr/bin/ld.lld

      # TEMPORARY: build the host-native Ada lib if the image doesn't ship it
      # yet. The pacman-packages image now has a host-ada-build stage providing
      # /opt/host/ada; remove this step once the pinned image SHA is bumped to a
      # build that includes it.
      - name: Build host Ada (fallback until image ships /opt/host/ada)
        run: |
          if [ ! -f /opt/host/ada/lib/libada.a ]; then
            apt-get install -y clang binutils
            ADA_VER=3.4.4
            base="https://github.com/ada-url/ada/releases/download/v${ADA_VER}"
            tmp="$(mktemp -d)"
            wget -q "${base}/ada.cpp" -O "$tmp/ada.cpp"
            wget -q "${base}/ada.h"   -O "$tmp/ada.h"
            wget -q "${base}/ada_c.h" -O "$tmp/ada_c.h"
            ( cd "$tmp" && clang++ -std=c++20 -O2 -fno-exceptions -fno-rtti -fPIC \
                -c ada.cpp -o ada.o && ar rcs libada.a ada.o )
            mkdir -p /opt/host/ada/lib /opt/host/ada/include
            cp "$tmp/libada.a" /opt/host/ada/lib/
            cp "$tmp/ada.h" "$tmp/ada_c.h" /opt/host/ada/include/
          fi

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @nx.js/runtime exec playwright install --with-deps chromium

      - name: Build nxjs-test binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19
          cmake --build build -j"$(nproc)"
        working-directory: packages/runtime/test

      - name: Run Tests
        run: pnpm test

      - name: Run Canvas 2D image tests
        # Pixel-compares nx.js (Skia) canvas rendering against Chrome (Skia)
        # for each fixture, reusing the nxjs-test binary in --png mode. Runs
        # after `pnpm test` so runtime.js (built by turbo's runtime#bundle) and
        # the nxjs-test binary both exist.
        run: pnpm --filter @nxjs/canvas-test test:canvas
