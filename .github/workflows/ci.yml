name: CI

on:
  push:
    branches:
      - main
    tags:
      - "!*"
  pull_request:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container: ghcr.io/tootallnate/pacman-packages@sha256:5fd521a2e2e884e41a42ce5bd412b17ae0498d5a5e61a66b6ca836b6b7bc66b8
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependent packages
        run: pnpm build --filter @nx.js/runtime

      - name: Bundle `runtime.js`
        run: pnpm bundle

      - name: Check bundle for esbuild class renames
        run: node packages/runtime/check-def-names.mjs

      - name: Build `nxjs.nro`
        run: make V=1

      - name: Build slim NRO launcher (`bootstrap.nro`)
        run: make -C bootstrap/launcher-nro V=1

      - name: Build slim NSP forwarder (`hbl.nso` / `hbl.npdm`)
        run: make -C bootstrap/launcher-nsp V=1

      - uses: actions/upload-artifact@v7
        with:
          name: nxjs.nro
          path: nxjs.nro

      - uses: actions/upload-artifact@v7
        with:
          name: bootstrap.nro
          path: bootstrap/launcher-nro/bootstrap.nro

      - uses: actions/upload-artifact@v7
        with:
          name: bootstrap-nsp
          path: |
            bootstrap/launcher-nsp/hbl.nso
            bootstrap/launcher-nsp/hbl.npdm

      - uses: actions/upload-artifact@v7
        with:
          name: nxjs.nsp
          path: |
            build/exefs/
            romfs/
            icon.jpg
            nxjs.nacp

  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Download `nxjs.nro`
        uses: actions/download-artifact@v8
        with:
          name: nxjs.nro

      - name: Download `bootstrap.nro`
        uses: actions/download-artifact@v8
        with:
          name: bootstrap.nro
          path: bootstrap-artifact

      - name: Download `bootstrap-nsp` (hbl.nso / hbl.npdm)
        uses: actions/download-artifact@v8
        with:
          name: bootstrap-nsp
          path: bootstrap-nsp-artifact

      - name: Download `nxjs.nsp`
        uses: actions/download-artifact@v8
        with:
          name: nxjs.nsp

      - name: Fetch git tags
        run: git fetch origin 'refs/tags/*:refs/tags/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Packages
        run: pnpm build

      - name: Copy `nxjs.nro` + `bootstrap.nro` to "@nx.js/nro"
        run: cp -v nxjs.nro bootstrap-artifact/bootstrap.nro packages/nro/dist

      - name: Copy files to "@nx.js/nsp"
        run: |
          cp -rv build/exefs romfs nxjs.nacp icon.jpg packages/nsp
          cp -v bootstrap-nsp-artifact/hbl.nso bootstrap-nsp-artifact/hbl.npdm packages/nsp/dist

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if published happened)
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { createRelease } = await import('${{ github.workspace }}/.github/scripts/create-release.mjs')
            await createRelease({ github, context })

  test:
    name: Test
    runs-on: ubuntu-latest
    # Run in the pacman-packages image: it provides the host-native V8, Skia,
    # libuv, and ada (under /opt/host) that the nxjs-test conformance harness
    # links against (the Switch portlibs are target_os=horizon and can't link
    # into a host ELF), plus the clang-19/lld-19 toolchain. The harness + Skia +
    # V8 are all built against the system libstdc++, so compile the harness with
    # clang-19/lld against /opt/host.
    container: ghcr.io/tootallnate/pacman-packages@sha256:5fd521a2e2e884e41a42ce5bd412b17ae0498d5a5e61a66b6ca836b6b7bc66b8
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Install build + host toolchain deps
        run: |
          apt-get update
          apt-get install -y \
            cmake pkg-config \
            libmbedtls-dev libfreetype-dev libharfbuzz-dev \
            libpng-dev libturbojpeg0-dev libjpeg62-turbo-dev libwebp-dev \
            zlib1g-dev libzstd-dev \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev \
            libswresample-dev
          # The image ships clang-19/lld-19 + the ld.lld symlink. LLVM >= 18 is
          # required to link the host V8/Skia archives (they use CREL
          # relocations that lld-16 cannot process — it would leave .init_array
          # unrelocated and the binary would crash at startup).
      - name: Setup Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @nx.js/runtime exec playwright install --with-deps chromium

      - name: Build nxjs-test binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19
          cmake --build build -j"$(nproc)"
        working-directory: packages/runtime/test

      - name: Run bootstrap launcher unit tests
        # Host-compiled semver/version-matching tests for the slim bootstrap
        # launcher (no Switch hardware / devkitPro needed).
        run: ./bootstrap/test/run.sh

      - name: Run Tests
        run: pnpm test

      - name: Run Canvas 2D image tests
        # Pixel-compares nx.js (Skia) canvas rendering against Chrome (Skia)
        # for each fixture, reusing the nxjs-test binary in --png mode. Runs
        # after `pnpm test` so runtime.js (built by turbo's runtime#bundle) and
        # the nxjs-test binary both exist.
        run: pnpm --filter @nxjs/canvas-test test:canvas
