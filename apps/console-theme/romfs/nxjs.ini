; Theme the on-screen console (Solarized Dark) declaratively, with zero app
; code. The runtime reads this `[console]` section from nxjs.ini (next to the
; entrypoint) at startup and seeds the global `console` from it. An app can
; still override at runtime by assigning `console.options = { … }`.
[console]
font_size      = 22
cursor_style   = bar

background      = #002b36 ; base03
foreground      = #839496 ; base0
cursor          = #93a1a1 ; base1

; Normal ANSI colors
black           = #073642 ; base02
red             = #dc322f
green           = #859900
yellow          = #b58900
blue            = #268bd2
magenta         = #d33682
cyan            = #2aa198
white           = #eee8d5 ; base2

; Bright ANSI colors
bright_black    = #586e75 ; base01
bright_red      = #cb4b16 ; orange
bright_green    = #586e75 ; base01
bright_yellow   = #657b83 ; base00
bright_blue     = #839496 ; base0
bright_magenta  = #6c71c4 ; violet
bright_cyan     = #93a1a1 ; base1
bright_white    = #fdf6e3 ; base3
